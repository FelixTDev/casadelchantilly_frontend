name: ci

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm test
      - run: npm run build
